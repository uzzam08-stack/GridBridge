<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI-Powered Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-bold mb-2">My AI Portfolio Dashboard</h1>
            <p class="text-slate-400">Autonomously updated by my AntiGravity Agent.</p>
        </header>

        <div id="portfolio-container" class="grid gap-6">
            <!-- Loading State -->
            <div class="glass p-8 rounded-2xl text-center">
                <p>Loading the latest insights from my agent...</p>
            </div>
        </div>
    </div>

    <script>
    async function fetchPortfolioData() {
        try {
            const response = await fetch('portfolio_data.json');
            const data = await response.json();
            
            // Assuming your JSON has these fields based on the screenshot
            const args = data.arguments; 
            
            const container = document.getElementById('portfolio-container');
            container.innerHTML = `
                <div class="glass p-8 rounded-3xl shadow-2xl border-blue-500/20">
                    <h2 class="text-3xl font-bold mb-2">${args.project_title}</h2>
                    <p class="text-slate-400 mb-6 italic">"${args.tagline}"</p>
                    
                    <div class="space-y-4">
                        <h3 class="font-semibold text-blue-400">Core Features:</h3>
                        <ul class="list-disc ml-5 space-y-2 text-slate-300">
                            ${args.core_features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        } catch (error) {
            // keep your error handling here
        }
    }
    fetchPortfolioData();
</script>
</body>
</html>
