<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI-Powered Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-bold mb-2">My AI Portfolio Dashboard</h1>
            <p class="text-slate-400">Autonomously updated by my AntiGravity Agent.</p>
        </header>

        <div id="portfolio-container" class="grid gap-6">
            <!-- Loading State -->
            <div class="glass p-8 rounded-2xl text-center">
                <p>Loading the latest insights from my agent...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchPortfolioData() {
            try {
                const response = await fetch('portfolio_data.json');
                const data = await response.json();
                
                const container = document.getElementById('portfolio-container');
                container.innerHTML = `
                    <div class="glass p-8 rounded-2xl">
                        <h2 class="text-2xl font-semibold mb-4">Latest Agent Analysis</h2>
                        <pre class="bg-black/30 p-4 rounded-lg overflow-x-auto text-sm">
                            ${JSON.stringify(data, null, 2)}
                        </pre>
                    </div>
                `;
            } catch (error) {
                document.getElementById('portfolio-container').innerHTML = 
                    '<div class="glass p-8 rounded-2xl text-red-400">Error: Could not load portfolio_data.json. Make sure it exists in the root!</div>';
            }
        }
        fetchPortfolioData();
    </script>
</body>
</html>
